version: 2

project_name: wt

before:
  hooks:
    - go mod tidy
    # Man pages are generated from the live cobra command tree so they can
    # never drift from --help. The ldflags mirror the build's version stamp.
    - go run -ldflags "-X github.com/didley/wt/internal/cli.version={{ .Version }}" ./cmd/wt gen-man man

builds:
  - main: ./cmd/wt
    binary: wt
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/didley/wt/internal/cli.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Listing files replaces goreleaser's defaults, so LICENSE/README stay
    # explicit alongside the generated man pages.
    files:
      - LICENSE
      - README.md
      - man/*.1

checksum:
  name_template: checksums.txt

changelog:
  use: github

# Publishes the `wt-cli` formula to didley/homebrew-tap. A formula (not a
# cask) is used on purpose: casks are macOS-only, and the CLI must install
# through Linuxbrew too. goreleaser deprecates `brews` in favor of
# `homebrew_casks`, but the replacement can't cover Linux — stay on `brews`
# until goreleaser offers a Linux-capable alternative.
brews:
  - name: wt-cli
    directory: Formula
    repository:
      owner: didley
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/didley/wt
    description: "Ergonomic git worktrees: create, list, switch, rename, remove"
    license: MIT
    # No generate_completions_from_executable: cobra's default `completion`
    # command is disabled (see internal/cli/root.go), completions are
    # generated interactively via `wt setup` instead.
    install: |
      bin.install "wt"
      man1.install Dir["man/*.1"]
    test: |
      system "#{bin}/wt", "--version"
