name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go build ./...
      - run: go vet ./...
      - name: test + coverage gate
        run: |
          source scripts/coverage-thresholds.sh
          go test -coverprofile=core.out ./internal/core/...
          go test -coverprofile=cli.out ./internal/cli/...
          go test ./cmd/...
          ./scripts/check-coverage.sh core.out "$CORE_COVERAGE_MIN" "internal/core"
          ./scripts/check-coverage.sh cli.out "$CLI_COVERAGE_MIN" "internal/cli"
      - if: matrix.os == 'ubuntu-latest'
        name: coverage badge up to date
        run: ./scripts/gen-coverage-badge.sh --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  gui:
    name: gui (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            tags: desktop,production,webkit2_41
          - os: macos-latest
            tags: desktop,production
            # UTType (used by wails' file dialogs) lives in
            # UniformTypeIdentifiers, which recent SDKs no longer link
            # implicitly.
            cgo_ldflags: -framework UniformTypeIdentifiers
    runs-on: ${{ matrix.os }}
    env:
      CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: gui/go.sum
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - run: go build -tags ${{ matrix.tags }} -o wt-gui .
        working-directory: gui
      - name: test + coverage gate
        working-directory: gui
        run: |
          source ../scripts/coverage-thresholds.sh
          go test -tags ${{ matrix.tags }} -coverprofile=gui.out ./...
          ../scripts/check-coverage.sh gui.out "$GUI_COVERAGE_MIN" "gui" .
