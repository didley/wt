name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # The release is gated on the test suite: a failing test aborts it.
      - run: go test ./...
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  # Builds the macOS desktop app (universal .app bundle) plus a universal
  # CLI binary, signs both with the Developer ID Application certificate
  # and notarizes them (stapling the ticket to wt.app; the bare CLI binary
  # can't be stapled, so Gatekeeper checks its ticket online), attaches the
  # zip to the release goreleaser just published, and updates the `wt`
  # cask in didley/homebrew-tap.
  gui-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: gui/go.sum
      - name: Import signing certificate into a temporary keychain
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/wt-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/wt-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          rm -f "$CERT_PATH"
      - name: Build universal GUI binary
        working-directory: gui
        env:
          # UTType (wails file dialogs) lives in UniformTypeIdentifiers,
          # which recent SDKs no longer link implicitly.
          CGO_LDFLAGS: -framework UniformTypeIdentifiers
        run: |
          CGO_ENABLED=1 GOARCH=arm64 go build -tags desktop,production -ldflags "-s -w" -o wt-gui-arm64 .
          CGO_ENABLED=1 GOARCH=amd64 go build -tags desktop,production -ldflags "-s -w" -o wt-gui-amd64 .
          lipo -create -output wt-gui wt-gui-arm64 wt-gui-amd64
      - name: Build universal CLI binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X github.com/didley/wt/internal/cli.version=${VERSION}"
          CGO_ENABLED=0 GOARCH=arm64 go build -ldflags "$LDFLAGS" -o wt-arm64 ./cmd/wt
          CGO_ENABLED=0 GOARCH=amd64 go build -ldflags "$LDFLAGS" -o wt-amd64 ./cmd/wt
          lipo -create -output wt wt-arm64 wt-amd64
      - name: Assemble, sign, and notarize wt.app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP=dist/wt.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          sed "s/__VERSION__/$VERSION/g" gui/build/darwin/Info.plist > "$APP/Contents/Info.plist"
          cp gui/wt-gui "$APP/Contents/MacOS/wt-gui"

          # icon.png (1024px) -> icon.icns with Apple's own tools
          mkdir icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s gui/build/darwin/icon.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
            d=$((s * 2))
            sips -z $d $d gui/build/darwin/icon.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns -o "$APP/Contents/Resources/icon.icns" icon.iconset

          IDENTITY="Developer ID Application: Dylan Lamont ($APPLE_TEAM_ID)"
          codesign --force --deep --options runtime \
            --entitlements gui/build/darwin/entitlements.plist \
            -s "$IDENTITY" "$APP"
          codesign --force --options runtime -s "$IDENTITY" wt
          cp wt dist/

          KEY_PATH="$RUNNER_TEMP/asc_api_key.p8"
          echo "$ASC_API_KEY_P8" > "$KEY_PATH"

          # wt.app: notarize, then staple the ticket to the bundle so
          # Gatekeeper can verify it offline.
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/wt-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/wt-notarize.zip" \
            --key "$KEY_PATH" --key-id "$ASC_API_KEY_ID" --issuer "$ASC_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"

          # wt (CLI): a bare executable can't be stapled, only a bundle/dmg/
          # pkg can. Notarizing it is still enough -- Gatekeeper looks up the
          # ticket online on first run.
          zip -j "$RUNNER_TEMP/wt-cli-notarize.zip" dist/wt
          xcrun notarytool submit "$RUNNER_TEMP/wt-cli-notarize.zip" \
            --key "$KEY_PATH" --key-id "$ASC_API_KEY_ID" --issuer "$ASC_API_ISSUER_ID" \
            --wait

          rm -f "$KEY_PATH" "$RUNNER_TEMP/wt-notarize.zip" "$RUNNER_TEMP/wt-cli-notarize.zip"

          (cd dist && zip -ry "wt_${VERSION}_darwin_universal.zip" wt.app wt)
      - name: Upload zip to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" "dist/wt_${VERSION}_darwin_universal.zip"
      - name: Update the wt cask in the tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "dist/wt_${VERSION}_darwin_universal.zip" | awk '{print $1}')
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/didley/homebrew-tap.git" tap
          mkdir -p tap/Casks
          sed -e "s/__VERSION__/$VERSION/" -e "s/__SHA256__/$SHA256/" \
            packaging/homebrew/wt-cask.rb.tmpl > tap/Casks/wt.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/wt.rb
          git commit -m "wt cask ${VERSION}"
          git push

  # Builds the Flatpak and attaches a single-file bundle to the release so
  # Linux users can install the GUI before (and after) the Flathub listing
  # exists: flatpak install ./wt.flatpak
  gui-flatpak:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flatpak-builder and runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.gnome.Platform//50 org.gnome.Sdk//50 \
            org.freedesktop.Sdk.Extension.golang//25.08
      - name: Build bundle
        run: |
          flatpak-builder --user --force-clean --repo=repo \
            build-dir packaging/flatpak/dev.didley.wt.yml
          flatpak build-bundle repo wt.flatpak dev.didley.wt
      - name: Upload bundle to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" wt.flatpak
